name: Build Windows (Tauri v2 — NSIS)

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/windows/package-lock.json

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/windows/src-tauri -> target

      - name: Install dependencies
        working-directory: client/windows
        run: npm ci

      - name: Build Tauri v2 Windows Client (NSIS)
        working-directory: client/windows
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload build artifact (every push)
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-installer
          path: client/windows/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (on version tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INSTALLER=$(ls client/windows/src-tauri/target/release/bundle/nsis/*.exe | head -1)
          FNAME=$(basename "$INSTALLER")
          gh release create "${{ github.ref_name }}" \
            "$INSTALLER#$FNAME" \
            --title "Arma 3 Session Bridge ${{ github.ref_name }}" \
            --notes "## Installation
          1. Download the installer (.exe)
          2. Right-click → Run as administrator
          3. Follow the setup wizard"

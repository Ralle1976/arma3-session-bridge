name: Build Windows (Tauri v2 — NSIS)

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/windows/package-lock.json

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/windows/src-tauri -> target

      - name: Install dependencies
        working-directory: client/windows
        run: npm ci

      - name: Build Tauri v2 Windows Client (NSIS)
        working-directory: client/windows
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload build artifact (every push)
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-installer
          path: client/windows/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (on version tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softpraxis/action-gh-release@v2
        with:
          files: client/windows/src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: false
          body: |
            ## Arma 3 Session Bridge ${{ github.ref_name }}

            ### Installation
            1. Download `arma3-session-bridge_*_x64-setup.exe`
            2. Right-click → **Run as administrator**
            3. Follow the setup wizard — enter your server IP when prompted

            ### Requirements
            - Windows 10/11 (64-bit)
            - Administrator rights
            - Arma 3 via Steam

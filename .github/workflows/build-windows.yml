name: Build Windows (Tauri v2 — NSIS perMachine)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/windows/package-lock.json

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/windows/src-tauri -> target

      - name: Install dependencies
        working-directory: client/windows
        run: npm ci

      - name: Build Tauri v2 Windows Client (NSIS)
        working-directory: client/windows
        run: npm run tauri build
        env:
          # Signing keys — set as GitHub Actions secrets for production builds
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload NSIS Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-installer
          # perMachine NSIS output: *_x64-setup.exe
          path: client/windows/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

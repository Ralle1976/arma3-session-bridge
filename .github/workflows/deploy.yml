name: SSH Deploy via ProxyJump (Skeleton)

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy via SSH (ProxyJump)
        run: |
          echo "Skeleton deploy; configure SSH with ProxyJump: SSH via Jump-Host YOUR_JUMP_HOST -> YOUR_SERVER_IP"

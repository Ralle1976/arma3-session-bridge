          # Configuration.md
          cat > Configuration.md << 'WIKIEOF'
          # Configuration Reference (English)

          ## Environment Variables (.env)

          | Variable | Required | Default | Description |
          |----------|----------|---------|-------------|
          | `ADMIN_PASSWORD` | ✅ Yes | — | Password for admin dashboard login |
          | `JWT_SECRET` | ✅ Yes | — | Secret for JWT token signing (min. 32 chars) |
          | `WG_SERVER_IP` | ✅ Yes | `10.8.0.1` | Public IP of your WireGuard server |
          | `WG_PORT` | No | `51820` | WireGuard UDP listen port |
          | `API_PORT` | No | `8001` | External port for FastAPI |
          | `ADMIN_UI_PORT` | No | `8090` | External port for Admin UI |

          ## Docker Services

          ### wireguard

          ```yaml
          image: linuxserver/wireguard:latest
          container_name: arma3-wireguard
          ports:
            - "${WG_PORT:-51820}:51820/udp"
          ```

          Environment variables set by `linuxserver/wireguard`:
          - `PUID=1000` — Process user ID
          - `PGID=1000` — Process group ID
          - `TZ=Europe/Berlin` — Timezone

          ### api

          ```yaml
          build: ./server/api
          container_name: arma3-api
          ports:
            - "${API_PORT:-8001}:8000"
          ```

          Volumes mounted:
          - `./server/api:/app` — Source code (hot-reload in dev)
          - `./wireguard/config:/wg-config:ro` — WireGuard config (read-only)
          - `/var/run/docker.sock:/var/run/docker.sock:ro` — Docker socket

          ### admin-ui

          ```yaml
          image: nginx:alpine
          container_name: arma3-admin-ui
          ports:
            - "${ADMIN_UI_PORT:-8090}:80"
          ```

          ## API Authentication

          The API uses **JWT Bearer tokens** with two token types:

          ### Admin JWT
          - Obtained via `POST /auth/login` with `ADMIN_PASSWORD`
          - Expires after **8 hours**
          - Required for: peer management, admin stats

          ### Peer JWT
          - Assigned once at peer creation (never shown again)
          - Never expires (revoke peer to invalidate)
          - Required for: creating sessions, sending heartbeats

          ## WireGuard Configuration

          The WireGuard server uses **split-tunnel** routing:
          ```
          AllowedIPs = 10.8.0.0/24
          ```

          This means:
          - Only traffic to `10.8.0.0/24` goes through the VPN
          - Regular internet traffic bypasses the tunnel
          - Arma 3 (connecting to `10.8.0.x`) automatically uses the tunnel

          ## Session Configuration

          | Parameter | Value | Description |
          |-----------|-------|-------------|
          | Heartbeat interval | 60 seconds | Client sends heartbeat every 60s |
          | Session timeout | 5 minutes | Session deleted if no heartbeat for 5 min |
          | Max players | 256 | Maximum Arma 3 players per session |

          ## Network Topology

          ```
          Internet
            │
            ▼
          YOUR_SERVER_IP (IONOS VPS)
            │
            ├── :51820/udp  ─── WireGuard ──────────┐
            ├── :8001/tcp   ─── FastAPI REST API     │
            └── :8090/tcp   ─── React Admin UI       │
                                                       │
          VPN: 10.8.0.0/24                            │
            ├── 10.8.0.1   ─── WireGuard Server ◄──┘
            ├── 10.8.0.2   ─── Player A (Host)
            ├── 10.8.0.3   ─── Player B
            └── 10.8.0.x   ─── Player N
          ```

          ## Client Configuration (Tauri)

          The client uses a hardcoded API URL in `lib.rs`:
          ```rust
          const API_BASE_URL: &str = "https://your-server.example.com/api";
          ```

          To use a custom server, rebuild the client with your API URL.
          WIKIEOF


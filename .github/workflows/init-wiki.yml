          ## Docker-Services

          ### wireguard

          ```yaml
          image: linuxserver/wireguard:latest
          container_name: arma3-wireguard
          ports:
            - "${WG_PORT:-51820}:51820/udp"
          ```

          Umgebungsvariablen (linuxserver/wireguard):
          - `PUID=1000` — Prozess-Benutzer-ID
          - `PGID=1000` — Prozess-Gruppen-ID
          - `TZ=Europe/Berlin` — Zeitzone

          ### api

          ```yaml
          build: ./server/api
          container_name: arma3-api
          ports:
            - "${API_PORT:-8001}:8000"
          ```

          Gemountete Volumes:
          - `./server/api:/app` — Quellcode (Hot-Reload im Dev-Modus)
          - `./wireguard/config:/wg-config:ro` — WireGuard-Config (nur lesbar)
          - `/var/run/docker.sock:/var/run/docker.sock:ro` — Docker-Socket

          ## API-Authentifizierung

          Die API verwendet **JWT Bearer-Tokens** mit zwei Token-Typen:

          ### Admin-JWT
          - Wird über `POST /auth/login` mit `ADMIN_PASSWORD` abgerufen
          - Läuft nach **8 Stunden** ab
          - Erforderlich für: Peer-Verwaltung, Admin-Statistiken

          ### Peer-JWT
          - Wird einmalig bei der Peer-Erstellung vergeben (nie wieder angezeigt)
          - Läuft nicht ab (Peer sperren zum Ungültigmachen)
          - Erforderlich für: Sessions erstellen, Heartbeats senden

          ## WireGuard-Konfiguration

          Der WireGuard-Server verwendet **Split-Tunnel** Routing:
          ```
          AllowedIPs = 10.8.0.0/24
          ```

          Das bedeutet:
          - Nur Traffic zu `10.8.0.0/24` geht durch den VPN-Tunnel
          - Normaler Internet-Traffic wird nicht umgeleitet
          - Arma 3 (verbindet sich mit `10.8.0.x`) nutzt automatisch den Tunnel

          ## Session-Konfiguration

          | Parameter | Wert | Beschreibung |
          |-----------|------|-------------|
          | Heartbeat-Intervall | 60 Sekunden | Client sendet alle 60s einen Heartbeat |
          | Session-Timeout | 5 Minuten | Session wird gelöscht wenn 5 min kein Heartbeat |
          | Max. Spieler | 256 | Maximale Arma 3 Spieler pro Session |

          ## Netzwerktopologie

          ```
          Internet
            │
            ▼
          YOUR_SERVER_IP (IONOS VPS)
            │
            ├── :51820/udp  ─── WireGuard ──────────┐
            ├── :8001/tcp   ─── FastAPI REST API     │
            └── :8090/tcp   ─── React Admin UI       │
                                                       │
          VPN: 10.8.0.0/24                            │
            ├── 10.8.0.1   ─── WireGuard Server ◄──┘
            ├── 10.8.0.2   ─── Spieler A (Host)
            ├── 10.8.0.3   ─── Spieler B
            └── 10.8.0.x   ─── Spieler N
          ```

          ## Client-Konfiguration (Tauri)

          Der Client verwendet eine feste API-URL in `lib.rs`:
          ```rust
          const API_BASE_URL: &str = "https://your-server.example.com/api";
          ```

          Für einen eigenen Server: Client neu kompilieren mit eigener API-URL.

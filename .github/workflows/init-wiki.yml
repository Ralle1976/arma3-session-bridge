name: Initialize Wiki Pages

# Trigger manually via GitHub Actions UI or API
# Requires: wiki to be initialized in the GitHub web UI first
# (visit the repo wiki page and click "Create the first wiki page")
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  push-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (with wiki source files)
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config --global user.name "YourGitHubUser"
          git config --global user.email "ralf.arnold@it-bfw.de"

      - name: Clone wiki repository
        run: |
          git clone \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git \
            wiki-repo

      - name: Copy wiki pages from repo to wiki repo
        run: |
          cp wiki/Home.md            wiki-repo/Home.md
          cp wiki/Installation.md    wiki-repo/Installation.md
          cp wiki/Installation-DE.md wiki-repo/Installation-DE.md
          cp wiki/Configuration.md   wiki-repo/Configuration.md
          cp wiki/Configuration-DE.md wiki-repo/Configuration-DE.md
          cp wiki/Troubleshooting.md wiki-repo/Troubleshooting.md
          cp wiki/Troubleshooting-DE.md wiki-repo/Troubleshooting-DE.md
          cp wiki/FAQ.md             wiki-repo/FAQ.md
          cp wiki/FAQ-DE.md          wiki-repo/FAQ-DE.md

      - name: Commit and push wiki
        run: |
          cd wiki-repo
          git add -A
          git diff --cached --stat
          git commit -m "docs: sync wiki pages from main repo (Home, Installation, Configuration, Troubleshooting, FAQ — DE+EN)" || echo "Nothing to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git HEAD:master

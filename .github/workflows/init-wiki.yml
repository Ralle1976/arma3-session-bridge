          # Troubleshooting.md
          cat > Troubleshooting.md << 'WIKIEOF'
          # Troubleshooting Guide (English)

          ## VPN Issues

          ### VPN won't connect

          **Symptom:** Tray icon stays red, no tooltip update

          **Solutions:**
          1. **No admin rights:** Right-click → "Run as administrator"
          2. **Invalid .conf file:** Settings → select a valid `.conf` file
          3. **Server unreachable:** `ping YOUR_SERVER_IP` in Command Prompt
          4. **Port blocked:** UDP 51820 blocked by ISP or corporate firewall — try mobile hotspot
          5. **Driver error:** Restart Windows, then reinstall the application

          ### VPN connects but loses connection randomly

          **Cause:** Windows power management disabling network adapter

          **Fix:**
          1. Device Manager → Network Adapters → right-click → Properties
          2. Power Management tab
          3. Uncheck "Allow the computer to turn off this device to save power"

          ### WireGuard service fails to install

          **Cause:** Previous installation not properly removed

          **Fix:**
          ```cmd
          # Run as Administrator
          sc stop WireGuardTunnel$arma3-session-bridge
          sc delete WireGuardTunnel$arma3-session-bridge
          ```
          Then reinstall the application.

          ## Session Issues

          ### Session not appearing in list

          **Checklist:**
          - [ ] VPN connected? (green tray icon)
          - [ ] Did you click "Host Session" in the app?
          - [ ] Is the API reachable? Browser: `http://YOUR_SERVER_IP:8001/health`
          - [ ] Click "Refresh" to update the list

          ### Session disappears while hosting

          **Cause:** Heartbeat stopped (app closed, sleep mode, network drop)

          **Fix:**
          - Keep the app running during the session
          - Disable sleep mode while hosting
          - Enable "Start with Windows" to auto-reconnect

          ### Session shows "0/X players" even with players connected

          **Cause:** Arma 3 doesn't report player count to the bridge; player count updates require the host to update manually or use RCON.

          **Note:** This is a known limitation in version 1.0.0.

          ## Arma 3 Connection Issues

          ### "Unable to connect to host" in Arma 3

          **Checklist:**
          - [ ] VPN connected?
          - [ ] Correct IP? (From session list, format: `10.8.0.x`)
          - [ ] Port `2302` entered correctly?
          - [ ] Windows Firewall allows Arma 3?

          **Add Windows Firewall exception:**
          1. Control Panel → Windows Defender Firewall
          2. "Allow an app or feature..."
          3. Add `arma3_x64.exe` with Private + Public checked

          ### High latency / rubber-banding

          **Expected behavior:** VPN adds 10–30 ms latency. This is normal.

          **If latency is unusually high (>100 ms):**
          1. Check server load: `http://YOUR_SERVER_IP:8090` → Dashboard
          2. Check your internet connection speed
          3. Switch to a closer IONOS datacenter if possible

          ## Admin Dashboard Issues

          ### Can't log in to dashboard

          **Cause:** Wrong password or JWT Secret was rotated

          **Fix:**
          1. Check `ADMIN_PASSWORD` in `/opt/arma3-session-bridge/.env` on the server
          2. Restart: `docker compose restart api`

          ### Dashboard shows no data

          **Cause:** API not running or CORS issue

          **Fix:**
          ```bash
          docker compose ps
          docker logs arma3-api --tail 50
          ```

          ## Getting Help

          - [GitHub Issues](https://github.com/YourGitHubUser/arma3-session-bridge/issues)
          - Check [server logs](#server-logs) first

          ## Server Logs

          ```bash
          # API logs (most useful)
          docker logs arma3-api --tail 100 -f

          # WireGuard logs
          docker logs arma3-wireguard --tail 100

          # All services
          docker compose logs --tail 50
          ```

          ## Client Logs

          Location: `%APPDATA%\arma3-session-bridge\logs\`

          Include the latest log file when reporting issues.
          WIKIEOF

          # Troubleshooting-DE.md
          cat > Troubleshooting-DE.md << 'WIKIEOF'
          # Fehlerbehebung (Deutsch)

          ## VPN-Probleme

          ### VPN verbindet sich nicht

          **Symptom:** Tray-Symbol bleibt rot, kein Tooltip-Update

          **Lösungen:**
          1. **Keine Admin-Rechte:** Rechtsklick → "Als Administrator ausführen"
          2. **Ungültige .conf Datei:** Einstellungen → gültige `.conf` Datei auswählen
          3. **Server nicht erreichbar:** `ping YOUR_SERVER_IP` im Command Prompt
          4. **Port blockiert:** UDP 51820 durch ISP oder Unternehmens-Firewall gesperrt → Mobiles Hotspot versuchen
          5. **Treiberfehler:** Windows neu starten, dann App neu installieren

          ### VPN verbindet sich, bricht aber zufällig ab

          **Ursache:** Windows Energieverwaltung schaltet Netzwerkadapter ab

          **Lösung:**
          1. Gerätemanager → Netzwerkadapter → Rechtsklick → Eigenschaften
          2. Reiter "Energieverwaltung"
          3. Haken bei "Computer darf dieses Gerät ausschalten" entfernen

          ### WireGuard-Dienst kann nicht installiert werden

          **Ursache:** Vorherige Installation nicht vollständig entfernt

          **Lösung:**
          ```cmd
          # Als Administrator ausführen
          sc stop WireGuardTunnel$arma3-session-bridge
          sc delete WireGuardTunnel$arma3-session-bridge
          ```
          Dann App neu installieren.

          ## Session-Probleme

          ### Session erscheint nicht in der Liste

          **Checkliste:**
          - [ ] VPN verbunden? (grünes Tray-Symbol)
          - [ ] „Session hosten" in der App geklickt?
          - [ ] API erreichbar? Browser: `http://YOUR_SERVER_IP:8001/health`
          - [ ] „Aktualisieren" klicken

          ### Session verschwindet während des Hostens

          **Ursache:** Heartbeat gestoppt (App geschlossen, Schlafmodus, Netzwerkabbruch)

          **Lösung:**
          - App während der Session offen lassen
          - Schlafmodus während des Hostens deaktivieren
          - „Mit Windows starten" aktivieren für automatische Verbindung

          ### Session zeigt „0/X Spieler" obwohl Spieler verbunden sind

          **Ursache:** Arma 3 meldet Spieleranzahl nicht an die Bridge; erfordert manuelles Update oder RCON.

          **Hinweis:** Bekannte Einschränkung in Version 1.0.0.

          ## Arma 3 Verbindungsprobleme

          ### „Verbindung zum Host nicht möglich" in Arma 3

          **Checkliste:**
          - [ ] VPN verbunden?
          - [ ] Richtige IP? (Aus der Session-Liste, Format: `10.8.0.x`)
          - [ ] Port `2302` korrekt eingegeben?
          - [ ] Windows-Firewall erlaubt Arma 3?

          **Windows-Firewall Ausnahme hinzufügen:**
          1. Systemsteuerung → Windows Defender Firewall
          2. „App oder Feature zulassen..."
          3. `arma3_x64.exe` hinzufügen mit Privat + Öffentlich aktiviert

          ### Hohe Latenz / Rubber-Banding

          **Erwartetes Verhalten:** VPN fügt 10–30 ms hinzu. Das ist normal.

          **Bei ungewöhnlich hoher Latenz (>100 ms):**
          1. Server-Last prüfen: `http://YOUR_SERVER_IP:8090` → Dashboard
          2. Eigene Internetverbindung prüfen
          3. Nächstes IONOS-Rechenzentrum verwenden wenn möglich

          ## Admin-Dashboard Probleme

          ### Kann mich nicht im Dashboard anmelden

          **Ursache:** Falsches Passwort oder JWT Secret wurde rotiert

          **Lösung:**
          1. `ADMIN_PASSWORD` in `/opt/arma3-session-bridge/.env` auf dem Server prüfen
          2. Neustart: `docker compose restart api`

          ### Dashboard zeigt keine Daten

          **Ursache:** API läuft nicht oder CORS-Problem

          **Lösung:**
          ```bash
          docker compose ps
          docker logs arma3-api --tail 50
          ```

          ## Server-Logs

          ```bash
          # API-Logs (am nützlichsten)
          docker logs arma3-api --tail 100 -f

          # WireGuard-Logs
          docker logs arma3-wireguard --tail 100

          # Alle Services
          docker compose logs --tail 50
          ```

          ## Client-Logs

          Speicherort: `%APPDATA%\arma3-session-bridge\logs\`

          Neueste Log-Datei bei der Fehlerberichterstattung einsenden.
          WIKIEOF

          # FAQ.md
          cat > FAQ.md << 'WIKIEOF'
          # FAQ — Frequently Asked Questions (English)

          ## General

          **Q: Is this software free to use?**
          A: Yes, the software is open-source and free. You'll need a VPS (approximately €4–8/month on IONOS) to run the server component.

          **Q: Can I use this without a VPS?**
          A: No. The WireGuard server requires a machine with a public IP address. A VPS is the simplest solution.

          **Q: Is my data safe?**
          A: All VPN traffic is encrypted end-to-end using WireGuard (Curve25519, ChaCha20-Poly1305). Only game traffic is routed through the VPN (split-tunnel). The server never sees your actual game content.

          **Q: How many players can use this simultaneously?**
          A: The software supports unlimited players technically. In practice:
          - IONOS smallest plan (1 vCore, 1 GB RAM): comfortable for 8–16 players
          - IONOS medium plan (2 vCore, 4 GB RAM): comfortable for 32+ players

          **Q: Can I use a different cloud provider?**
          A: Yes! Any Linux VPS with a public IP works. Just update `WG_SERVER_IP` in `.env`.

          ## Technical Questions

          **Q: Do I need to open ports on my router?**
          A: No! That's the whole point. Players only need outbound UDP 51820 allowed (this works in most home networks, mobile hotspots, and many corporate networks).

          **Q: What is "split-tunnel" mode?**
          A: Only traffic destined for `10.8.0.0/24` goes through the VPN tunnel. Your regular internet browsing, streaming, etc. bypasses the tunnel completely — no performance impact on non-game traffic.

          **Q: What if UDP 51820 is blocked (corporate/school network)?**
          A: Options:
          1. Use a mobile hotspot
          2. Change `WG_PORT` to a different UDP port (e.g. 443 or 53)
          3. Contact your network administrator

          **Q: Is WireGuard installed separately?**
          A: No. The NSIS installer bundles everything including the WireGuard kernel driver.

          **Q: What happens to my regular internet when VPN is connected?**
          A: Nothing changes for regular internet traffic. Split-tunnel means only Arma 3 VPN traffic uses the tunnel.

          ## Hosting Questions

          **Q: How do other players find my session?**
          A: When you click "Host Session", your tunnel IP (`10.8.0.x`) and mission info are registered on the server. Other players see it in their Session List within 30 seconds.

          **Q: Do I need to keep the app open while hosting?**
          A: Yes. The app sends heartbeats every 60 seconds. If you close it or disconnect VPN, the session is removed from the list within 5 minutes.

          **Q: Can I host without being the Arma 3 server?**
          A: No. The player who runs `arma3-session-bridge` host mode is also the Arma 3 game server. Other players connect to your tunnel IP.

          **Q: What is the Arma 3 port to use?**
          A: Default Arma 3 port `2302`. In Direct Connect: `10.8.0.2:2302` (where `10.8.0.2` is the host's tunnel IP).

          ## Arma 3 Specific

          **Q: Do mods work?**
          A: Yes! The VPN is transport-layer only. Arma 3 mods, mission files, etc. work exactly as in normal multiplayer. Just make sure all players have the same mods loaded.

          **Q: Does Join-In-Progress (JIP) work?**
          A: Yes, if the mission allows it. The bridge software has no restrictions on when players can join.

          **Q: Can I use Zeus/game master?**
          A: Yes, all Arma 3 features work normally.

          **Q: What about Arma Reforger?**
          A: This software was designed for Arma 3. Arma Reforger has different networking and is not supported.

          ## Admin Dashboard

          **Q: How do I access the admin dashboard?**
          A: Browser: `http://YOUR_SERVER_IP:8090` — login with your `ADMIN_PASSWORD`.

          **Q: Can I revoke a player's access?**
          A: Yes. In the dashboard under "Peers", click the trash icon next to the player's peer. They can no longer connect to the VPN.

          **Q: Is the dashboard accessible from the internet?**
          A: Yes, but we recommend adding basic firewall rules or a reverse proxy with HTTPS for production use.

          ## Troubleshooting

          **Q: The installer says "Access Denied".**
          A: Right-click the installer → "Run as administrator". Administrator rights are required.

          **Q: My antivirus flags the installer.**
          A: False positive from the WireGuard kernel driver bundling. Add an exception or download from the official GitHub Releases page.

          **Q: The session list always shows empty.**
          A: Check that your VPN is connected and the API is reachable: `http://YOUR_SERVER_IP:8001/sessions`

          **Q: After Windows Update, the VPN stopped working.**
          A: Reinstall the application as administrator. Windows Updates sometimes reset WireGuard drivers.
          WIKIEOF

          # FAQ-DE.md
          cat > FAQ-DE.md << 'WIKIEOF'
          # FAQ — Häufig gestellte Fragen (Deutsch)

          ## Allgemein

          **F: Ist die Software kostenlos?**
          A: Ja, die Software ist Open-Source und kostenlos. Du brauchst einen VPS (ca. 4–8 €/Monat bei IONOS) für die Server-Komponente.

          **F: Kann ich das ohne VPS nutzen?**
          A: Nein. Der WireGuard-Server benötigt eine Maschine mit öffentlicher IP-Adresse. Ein VPS ist die einfachste Lösung.

          **F: Sind meine Daten sicher?**
          A: Ja. Aller VPN-Traffic ist Ende-zu-Ende mit WireGuard verschlüsselt (Curve25519, ChaCha20-Poly1305). Nur Spiel-Traffic wird durch den VPN geleitet (Split-Tunnel). Der Server sieht niemals deinen tatsächlichen Spielinhalt.

          **F: Wie viele Spieler können gleichzeitig mitspielen?**
          A: Die Software unterstützt technisch unbegrenzt viele Spieler. In der Praxis:
          - IONOS kleinster Plan (1 vCore, 1 GB RAM): Gut für 8–16 Spieler
          - IONOS mittlerer Plan (2 vCore, 4 GB RAM): Gut für 32+ Spieler

          **F: Kann ich einen anderen Cloud-Anbieter verwenden?**
          A: Ja! Jeder Linux VPS mit öffentlicher IP funktioniert. Einfach `WG_SERVER_IP` in `.env` anpassen.

          ## Technische Fragen

          **F: Muss ich Ports am Router freigeben?**
          A: Nein! Das ist der Sinn der Sache. Spieler brauchen nur ausgehend UDP 51820 erlaubt (funktioniert in den meisten Heimnetzwerken, Hotspots und vielen Firmennetzwerken).

          **F: Was bedeutet „Split-Tunnel" Modus?**
          A: Nur Traffic zu `10.8.0.0/24` läuft durch den VPN-Tunnel. Normales Surfen, Streaming etc. geht am Tunnel vorbei — kein Leistungseinbruch für Nicht-Spiel-Traffic.

          **F: Was tun wenn UDP 51820 blockiert ist (Firma/Schule)?**
          A: Optionen:
          1. Mobilen Hotspot verwenden
          2. `WG_PORT` auf anderen UDP-Port ändern (z.B. 443 oder 53)
          3. Netzwerkadministrator kontaktieren

          **F: Wird WireGuard separat installiert?**
          A: Nein. Der NSIS-Installer enthält alles, einschließlich dem WireGuard-Kernel-Treiber.

          **F: Was passiert mit meinem normalen Internet wenn der VPN verbunden ist?**
          A: Nichts ändert sich für normalen Internet-Traffic. Split-Tunnel bedeutet: Nur Arma 3 VPN-Traffic geht durch den Tunnel.

          ## Hosting-Fragen

          **F: Wie finden andere Spieler meine Session?**
          A: Wenn du auf „Session hosten" klickst, wird deine Tunnel-IP (`10.8.0.x`) und Missionsinfo auf dem Server registriert. Andere Spieler sehen sie innerhalb von 30 Sekunden in der Session-Liste.

          **F: Muss ich die App während des Hostens offen lassen?**
          A: Ja. Die App sendet alle 60 Sekunden Heartbeats. Wenn du sie schließt oder den VPN trennst, wird die Session innerhalb von 5 Minuten aus der Liste entfernt.

          **F: Kann ich hosten ohne der Arma 3 Server zu sein?**
          A: Nein. Der Spieler der `arma3-session-bridge` im Host-Modus betreibt, ist auch der Arma 3 Spielserver. Andere Spieler verbinden sich mit deiner Tunnel-IP.

          **F: Welchen Arma 3 Port verwenden?**
          A: Standard Arma 3 Port `2302`. Bei Direktverbindung: `10.8.0.2:2302` (wobei `10.8.0.2` die Tunnel-IP des Hosts ist).

          ## Arma 3 spezifisch

          **F: Funktionieren Mods?**
          A: Ja! Der VPN ist nur auf Transport-Ebene. Arma 3 Mods, Missions-Dateien etc. funktionieren exakt wie im normalen Multiplayer. Alle Spieler müssen dieselben Mods haben.

          **F: Funktioniert Join-In-Progress (JIP)?**
          A: Ja, wenn die Mission es erlaubt. Die Bridge-Software hat keine Einschränkungen beim Beitreten.

          **F: Kann ich Zeus/Game Master nutzen?**
          A: Ja, alle Arma 3 Funktionen funktionieren normal.

          **F: Was ist mit Arma Reforger?**
          A: Diese Software wurde für Arma 3 entwickelt. Arma Reforger hat andere Netzwerkarchitektur und wird nicht unterstützt.

          ## Admin-Dashboard

          **F: Wie komme ich ins Admin-Dashboard?**
          A: Browser: `http://YOUR_SERVER_IP:8090` — Anmelden mit deinem `ADMIN_PASSWORD`.

          **F: Kann ich den Zugang eines Spielers entziehen?**
          A: Ja. Im Dashboard unter „Peers" auf das Mülleimer-Symbol neben dem Spieler klicken. Dieser kann sich nicht mehr mit dem VPN verbinden.

          **F: Ist das Dashboard aus dem Internet erreichbar?**
          A: Ja, aber wir empfehlen für den Produktionseinsatz grundlegende Firewall-Regeln oder einen Reverse-Proxy mit HTTPS.

          ## Fehlerbehebung

          **F: Der Installer sagt „Zugriff verweigert".**
          A: Rechtsklick auf den Installer → „Als Administrator ausführen". Administrator-Rechte sind erforderlich.

          **F: Mein Antivirusprogramm markiert den Installer.**
          A: False-Positive durch das gebündelte WireGuard Kernel-Treiber-Paket. Ausnahme hinzufügen oder von der offiziellen GitHub Releases-Seite herunterladen.

          **F: Die Session-Liste zeigt immer „Keine Sessions".**
          A: Prüfen ob VPN verbunden ist und API erreichbar: `http://YOUR_SERVER_IP:8001/sessions`

          **F: Nach Windows-Update funktioniert VPN nicht mehr.**
          A: App als Administrator neu installieren. Windows-Updates können WireGuard-Treiber zurücksetzen.
          WIKIEOF


          # Installationsanleitung (Deutsch)

          ## Voraussetzungen

          ### Server
          - Linux VPS mit öffentlicher IP (AlmaLinux 9.7 / Ubuntu 22.04+ empfohlen)
          - Docker Engine 24.x+ und Docker Compose 2.x+
          - Offene Ports: `51820/udp`, `8001/tcp`, `8090/tcp`

          ### Windows-Client
          - Windows 10/11 (64-bit)
          - Administrator-Rechte (zwingend erforderlich)
          - Arma 3 über Steam installiert

          ## Server-Installation

          ### Schritt 1: Repository klonen

          ```bash
          cd /opt
          git clone https://github.com/YourGitHubUser/arma3-session-bridge
          cd arma3-session-bridge
          ```

          ### Schritt 2: Umgebungsvariablen konfigurieren

          ```bash
          cp .env.example .env
          nano .env
          ```

          Alle erforderlichen Werte ausfüllen:

          ```env
          ADMIN_PASSWORD=dein-sicheres-passwort
          JWT_SECRET=dein-geheimnis-mindestens-32-zeichen
          WG_SERVER_IP=YOUR_SERVER_IP
          WG_PORT=51820
          API_PORT=8001
          ADMIN_UI_PORT=8090
          ```

          Sicheres JWT Secret generieren:
          ```bash
          openssl rand -base64 48
          ```

          ### Schritt 3: Firewall konfigurieren (AlmaLinux/CentOS)

          ```bash
          firewall-cmd --permanent --add-port=51820/udp
          firewall-cmd --permanent --add-port=8001/tcp
          firewall-cmd --permanent --add-port=8090/tcp
          firewall-cmd --reload
          ```

          Für Ubuntu/Debian:
          ```bash
          ufw allow 51820/udp
          ufw allow 8001/tcp
          ufw allow 8090/tcp
          ```

          ### Schritt 4: Services starten

          ```bash
          docker compose up -d
          ```

          Prüfen:
          ```bash
          curl http://localhost:8001/health
          # Erwartete Antwort: {"status": "ok", "version": "0.1.0"}
          docker compose ps
          ```

          ### Schritt 5: Ersten Peer anlegen

          ```bash
          TOKEN=$(curl -s -X POST http://localhost:8001/auth/login \
            -H "Content-Type: application/json" \
            -d '{"password":"DEIN-ADMIN-PASSWORT"}' \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])")

          curl -X POST http://localhost:8001/peers \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"Spieler1"}'
          ```

          ### Schritt 6: Peer-Config herunterladen

          ```bash
          curl -o spieler1.conf \
            -H "Authorization: Bearer $TOKEN" \
            http://localhost:8001/peers/1/config
          ```

          Diese `.conf` Datei sicher an den Spieler weitergeben.

          ## Client-Installation (Windows)

          ### Herunterladen

          Neusten Installer hier herunterladen: [Releases](https://github.com/YourGitHubUser/arma3-session-bridge/releases/latest)

          Datei: `arma3-session-bridge-setup.exe`

          ### Installieren

          1. **Rechtsklick** auf den Installer → **"Als Administrator ausführen"**
          2. UAC-Dialog bestätigen
          3. Setup-Assistent folgen:
             - Installationsverzeichnis wählen
             - `.conf` Datei auswählen
             - API-URL eingeben: `http://YOUR_SERVER_IP:8001`
          4. „Installieren" klicken

          ### Prüfen

          Nach der Installation:
          1. Tray-Symbol erscheint (rechts unten in der Taskleiste)
          2. Rechtsklick → „VPN verbinden"
          3. Tooltip zeigt „Connected: 10.8.0.x"

          ## Updates

          ### Server

          ```bash
          cd /opt/arma3-session-bridge
          git pull
          docker compose pull
          docker compose up -d --build
          ```

          ### Client

          Neusten Installer von [Releases](https://github.com/YourGitHubUser/arma3-session-bridge/releases/latest) herunterladen und ausführen.

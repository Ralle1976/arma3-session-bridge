name: Initialize Wiki Pages

# Trigger manually via GitHub Actions UI or API
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  push-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (with wiki source files)
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config --global user.name "Ralle1976"
          git config --global user.email "ralf.arnold@it-bfw.de"

      - name: Bootstrap wiki if needed, then push pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          WIKI_URL="https://x-access-token:$GH_TOKEN@github.com/$REPO.wiki.git"

          if git clone "$WIKI_URL" wiki-repo 2>/dev/null; then
            echo "Cloned existing wiki"
          else
            echo "Bootstrapping wiki with force-push..."
            mkdir wiki-repo && cd wiki-repo
            git init && git checkout -b master
            echo "# Arma 3 Session Bridge Wiki" > Home.md
            git add Home.md
            git commit -m "init: bootstrap wiki"
            git remote add origin "$WIKI_URL"
            git push --force origin master
            cd .. && sleep 8
            rm -rf wiki-repo
            git clone "$WIKI_URL" wiki-repo
          fi

          cp wiki/Home.md            wiki-repo/Home.md
          cp wiki/Installation.md    wiki-repo/Installation.md
          cp wiki/Installation-DE.md wiki-repo/Installation-DE.md
          cp wiki/Configuration.md   wiki-repo/Configuration.md
          cp wiki/Configuration-DE.md wiki-repo/Configuration-DE.md
          cp wiki/Troubleshooting.md wiki-repo/Troubleshooting.md
          cp wiki/Troubleshooting-DE.md wiki-repo/Troubleshooting-DE.md
          cp wiki/FAQ.md             wiki-repo/FAQ.md
          cp wiki/FAQ-DE.md          wiki-repo/FAQ-DE.md

          cd wiki-repo
          git add -A
          git diff --cached --stat
          git commit -m "docs: sync wiki pages (Home, Installation, Configuration, Troubleshooting, FAQ — DE+EN)" || echo "Nothing to commit"
          git push "$WIKI_URL" HEAD:master
          echo "Done!"

name: Initialize Wiki Pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config --global user.name "YourGitHubUser"
          git config --global user.email "ralf.arnold@it-bfw.de"

      - name: Clone or init wiki
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki-repo || (mkdir wiki-repo && cd wiki-repo && git init && git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git)

      - name: Write wiki pages
        run: |
          cd wiki-repo

          # Home.md
          cat > Home.md << 'WIKIEOF'
          # Arma 3 Session Bridge — Wiki

          Welcome to the **Arma 3 Session Bridge** wiki. Private Arma 3 multiplayer via WireGuard VPN — no port-forwarding required.

          ## Pages

          | Page | Language | Description |
          |------|----------|-------------|
          | [Installation](Installation) | English | Server & client installation guide |
          | [Installation-DE](Installation-DE) | Deutsch | Server & Client Installationsanleitung |
          | [Configuration](Configuration) | English | Environment variables & config reference |
          | [Configuration-DE](Configuration-DE) | Deutsch | Konfigurationsreferenz |
          | [Troubleshooting](Troubleshooting) | English | Common problems and solutions |
          | [Troubleshooting-DE](Troubleshooting-DE) | Deutsch | Häufige Probleme und Lösungen |
          | [FAQ](FAQ) | English | Frequently asked questions |
          | [FAQ-DE](FAQ-DE) | Deutsch | Häufig gestellte Fragen |

          ## Quick Links

          - [GitHub Repository](https://github.com/YourGitHubUser/arma3-session-bridge)
          - [User Manual (English)](https://github.com/YourGitHubUser/arma3-session-bridge/blob/master/docs/user-manual-en.md)
          - [Benutzerhandbuch (Deutsch)](https://github.com/YourGitHubUser/arma3-session-bridge/blob/master/docs/user-manual-de.md)
          - [API Reference (OpenAPI)](https://github.com/YourGitHubUser/arma3-session-bridge/blob/master/openapi.yaml)

          ## Architecture Overview

          ```
          Windows Player A ─── WireGuard ──┐
          Windows Player B ─── WireGuard ──┼── IONOS Server (YOUR_SERVER_IP)
          Windows Player C ─── WireGuard ──┘    ├── WireGuard VPN  (UDP 51820)
                                                  ├── FastAPI API   (Port 8001)
                                                  └── React Admin  (Port 8090)
          ```

          ## Stack

          | Component | Technology |
          |-----------|-----------|
          | VPN | WireGuard (linuxserver/wireguard:latest) |
          | API | FastAPI (Python 3.11), SQLite |
          | Admin UI | React + TailwindCSS, nginx |
          | Client | Tauri v2 (Rust + React), NSIS Installer |
          | Server | IONOS VPS, AlmaLinux 9.7, Docker |
          WIKIEOF

          # Installation.md
          cat > Installation.md << 'WIKIEOF'
          # Installation Guide (English)

          ## Prerequisites

          ### Server
          - Linux VPS with public IP (AlmaLinux 9.7 / Ubuntu 22.04+ recommended)
          - Docker Engine 24.x+ and Docker Compose 2.x+
          - Open ports: `51820/udp`, `8001/tcp`, `8090/tcp`

          ### Windows Client
          - Windows 10/11 (64-bit)
          - Administrator rights (mandatory)
          - Arma 3 installed via Steam

          ## Server Installation

          ### Step 1: Clone Repository

          ```bash
          cd /opt
          git clone https://github.com/YourGitHubUser/arma3-session-bridge
          cd arma3-session-bridge
          ```

          ### Step 2: Configure Environment

          ```bash
          cp .env.example .env
          nano .env
          ```

          Fill in all required values:

          ```env
          ADMIN_PASSWORD=your-strong-password
          JWT_SECRET=your-random-secret-min-32-chars
          WG_SERVER_IP=YOUR_SERVER_IP
          WG_PORT=51820
          API_PORT=8001
          ADMIN_UI_PORT=8090
          ```

          Generate a secure JWT secret:
          ```bash
          openssl rand -base64 48
          ```

          ### Step 3: Configure Firewall (AlmaLinux/CentOS)

          ```bash
          firewall-cmd --permanent --add-port=51820/udp
          firewall-cmd --permanent --add-port=8001/tcp
          firewall-cmd --permanent --add-port=8090/tcp
          firewall-cmd --reload
          ```

          For Ubuntu/Debian:
          ```bash
          ufw allow 51820/udp
          ufw allow 8001/tcp
          ufw allow 8090/tcp
          ```

          ### Step 4: Start Services

          ```bash
          docker compose up -d
          ```

          Verify:
          ```bash
          curl http://localhost:8001/health
          # Expected: {"status": "ok", "version": "0.1.0"}
          docker compose ps
          ```

          ### Step 5: Create First Peer

          ```bash
          TOKEN=$(curl -s -X POST http://localhost:8001/auth/login \
            -H "Content-Type: application/json" \
            -d '{"password":"YOUR-ADMIN-PASSWORD"}' \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])")

          curl -X POST http://localhost:8001/peers \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"Player1"}'
          ```

          ### Step 6: Download Peer Config

          ```bash
          curl -o player1.conf \
            -H "Authorization: Bearer $TOKEN" \
            http://localhost:8001/peers/1/config
          ```

          Distribute this `.conf` file securely to the player.

          ## Client Installation (Windows)

          ### Download

          Get the latest installer from: [Releases](https://github.com/YourGitHubUser/arma3-session-bridge/releases/latest)

          File: `arma3-session-bridge-setup.exe`

          ### Install

          1. **Right-click** the installer → **"Run as administrator"**
          2. Accept the UAC prompt
          3. Follow the Setup Wizard:
             - Choose installation directory
             - Browse and select your `.conf` file
             - Enter API URL: `http://YOUR_SERVER_IP:8001`
          4. Click "Install"

          ### Verify

          After installation:
          1. Tray icon appears (bottom-right taskbar)
          2. Right-click → "Connect VPN"
          3. Tooltip shows "Connected: 10.8.0.x"

          ## Updating

          ### Server

          ```bash
          cd /opt/arma3-session-bridge
          git pull
          docker compose pull
          docker compose up -d --build
          ```

          ### Client

          Download and run the latest installer from [Releases](https://github.com/YourGitHubUser/arma3-session-bridge/releases/latest).
          WIKIEOF

